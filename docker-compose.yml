version: '3.8'

services:
  backend:
    build:
      context: ./test-agent
      dockerfile: Dockerfile
    container_name: stapler-backend
    ports:
      - "313:313"
    env_file:
      - ./test-agent/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./stapler-3ad5fc
      dockerfile: Dockerfile
    container_name: stapler-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
